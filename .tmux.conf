  set -g status-right "#[fg=#2e3440,bg=default]#[fg=#d8dee9,bg=#2e3440] #(uptime | rev | cut -d: -f1 | rev | sed s/,//g | xargs) #[fg=#4c566a,bg=#2e3440]#[fg=#d8dee9,bg=#4c566a,bold] %H:%M:%S %Y-%m-%d "
