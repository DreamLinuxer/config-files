# $Id: screen-keys.conf,v 1.7 2010-07-31 11:39:13 nicm Exp $
#
# By Nicholas Marriott. Public domain.
#
# This configuration file binds many of the common GNU screen key bindings to
# appropriate tmux key bindings. Note that for some key bindings there is no
# tmux analogue and also that this set omits binding some commands available in
# tmux but not in screen.
#
# Note this is only a selection of key bindings and they are in addition to the
# normal tmux key bindings. This is intended as an example not as to be used
# as-is.

# Set the prefix to ^A.
unbind C-b
set -g prefix ^A
bind a send-prefix

# Bind appropriate commands similar to screen.
# lockscreen ^X x 
unbind ^X
bind ^X lock-server
unbind x
bind x lock-server

# screen ^C c 
unbind ^C
bind ^C new-window
unbind c
bind c new-window

# detach ^D d
unbind ^D
bind ^D detach

# displays * 
unbind *
bind * list-clients

# next ^@ ^N sp n 
unbind ^@
bind ^@ next-window
unbind ^N
bind ^N next-window
unbind " "
bind " " next-window
unbind n
bind n next-window

# title A
unbind A
bind A command-prompt "rename-window %%"

# other ^A
unbind ^A
bind ^A last-window

# prev ^H ^P p ^? 
unbind ^H
bind ^H previous-window
unbind ^P
bind ^P previous-window
unbind p
bind p previous-window
unbind BSpace
bind BSpace previous-window

# windows ^W w 
unbind ^W
bind ^W list-windows
unbind w
bind w list-windows

# quit \ 
unbind '\'
bind '\' confirm-before "kill-server"

# kill K k 
unbind K
bind K confirm-before "kill-window"
unbind k
bind k confirm-before "kill-window"

# redisplay ^L l 
unbind ^L
bind ^L refresh-client
unbind l
bind l refresh-client

# split -v |
unbind |
bind | split-window

# :kB: focus up
unbind Tab
bind Tab select-pane -t:.+
unbind BTab
bind BTab select-pane -t:.-

# " windowlist -b
unbind '"'
bind '"' choose-window

# General Options
set-option -g base-index 0
set-option -g renumber-windows off
set-option -g status-interval 1
# setw -g xterm-keys on

### LOOK & FEEL ###
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*-256color:Tc"
set -g status-interval 1
set -g status-justify left

# Theme: per-host color scheme
# Default: gruvbox
  set -g status-style "fg=#ebdbb2,bg=#282828"
  set -g status-left-length 60
  set -g status-left "#[fg=#ebdbb2,bg=#504945,bold] #S #[fg=#504945,bg=#282828]#[fg=#ebdbb2,bg=#282828] #h #[fg=#282828,bg=default]"
  set -g status-right-length 80
  set -g status-right "#[fg=#282828,bg=default]#[fg=#ebdbb2,bg=#282828] #(uptime | rev | cut -d: -f1 | rev | sed s/,//g | xargs) #[fg=#504945,bg=#282828]#[fg=#ebdbb2,bg=#504945,bold] %H:%M:%S %Y-%m-%d "
  set -g window-status-separator ""
  set -g window-status-format "#[fg=#282828,bg=#504945]#[fg=#ebdbb2,bg=#504945] #I:#W #{?window_bell_flag,#{?window_last_flag,↯ ,⚡ },#{?window_last_flag,◎ ,○ }}#[fg=#504945,bg=#282828]"
  set -g window-status-current-format "#[fg=#282828,bg=#d79921]#[fg=#fbf1c7,bg=#d79921,bold] #I:#W ● #[fg=#d79921,bg=#282828]"
  set -g pane-border-style "fg=#3c3836"
  set -g pane-active-border-style "fg=#d79921"
  set -g message-style "fg=#fbf1c7,bg=#3c3836"
  set -g display-panes-active-colour "#d79921"
  set -g display-panes-colour "#504945"
  set -g clock-mode-colour "#d79921"
  set -g window-status-bell-style "fg=#ebdbb2,bg=#504945"

